version: '2'
services:
  wallet:
    image: ghcr.io/gentoorax/docker-bitcoin-wallet:1.0.4-alpha-btc31
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bitcoin-wallet
    volumes_from:
    - wallet-data
    environment:
      - ENABLE_WEB_VIEW=yes
      - DISPLAY=unix$DISPLAY
      - DEBUG=yes
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # ports:
    #  - "10000:10000"
  wallet-data:
    image: ghcr.io/gentoorax/docker-bitcoin-wallet:1.0.4-alpha-btc31
    container_name: wallet-data
    volumes:
    -  /tmp/.X11-unix:/tmp/.X11-unix
    - /etc/localtime:/etc/localtime:ro
    command: /bin/true
