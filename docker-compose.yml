version: '3'
services:
  wallet:
    image: ghcr.io/gentoorax/docker-bitcoin-wallet:1.0.4-alpha-btc31
    container_name: bitcoin-wallet
    volumes:
      -  /tmp/.X11-unix:/tmp/.X11-unix
      - /etc/localtime:/etc/localtime:ro
      - /docker/bitcoin-data:/home/user/.bitcoin # Bitcoin wallet/data mapping
    environment:
      - ENABLE_WEB_VIEW=yes
      - DISPLAY=unix$DISPLAY
      - DEBUG=no
      - USER_UID=1026
      - XPRA_USER=${XPRA_USER:-user}
      - XPRA_PASSWORD=${XPRA_PASSWORD:?Set XPRA_PASSWORD before exposing web view}
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # ports:
    #  - "10000:10000"
