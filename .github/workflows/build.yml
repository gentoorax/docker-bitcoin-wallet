name: Build and Publish

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/gentoorax/docker-bitcoin-wallet
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version metadata
        id: meta
        run: |
          MAJOR="${{ vars.MAJOR_VERSION }}"
          MINOR="${{ vars.MINOR_VERSION }}"
          if [ -z "${MAJOR}" ]; then
            MAJOR="1"
          fi
          if [ -z "${MINOR}" ]; then
            MINOR="0"
          fi
          REVISION="${GITHUB_RUN_NUMBER}"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          VERSION="${MAJOR}.${MINOR}.${REVISION}"
          PRE_RELEASE="${VERSION}-alpha-${SHORT_SHA}"
          echo "major=${MAJOR}" >> "${GITHUB_OUTPUT}"
          echo "minor=${MINOR}" >> "${GITHUB_OUTPUT}"
          echo "revision=${REVISION}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "pre_release=${PRE_RELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.pre_release }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.pre_release }}
