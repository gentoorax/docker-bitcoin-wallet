name: Build and Publish

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      IMAGE_NAME: ghcr.io/gentoorax/docker-bitcoin-wallet
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Load version prefix
        run: cat .drone/version-prefix.env >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version metadata
        id: meta
        run: |
          MAJOR="${VERSION_MAJOR:-1}"
          MINOR="${VERSION_MINOR:-0}"
          if [ -z "${MAJOR}" ]; then
            MAJOR="1"
          fi
          if [ -z "${MINOR}" ]; then
            MINOR="0"
          fi
          REVISION="${GITHUB_RUN_NUMBER}"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          VERSION="${MAJOR}.${MINOR}.${REVISION}"
          PRE_RELEASE="${VERSION}-alpha-${SHORT_SHA}"
          echo "major=${MAJOR}" >> "${GITHUB_OUTPUT}"
          echo "minor=${MINOR}" >> "${GITHUB_OUTPUT}"
          echo "revision=${REVISION}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "pre_release=${PRE_RELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.pre_release }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.pre_release }}

      - name: Generate release evidence
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ steps.meta.outputs.pre_release }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          mkdir -p provenance

          cat > provenance/release-metadata.json <<EOF
          {
            "image": {
              "name": "${IMAGE_NAME}",
              "tag": "${IMAGE_TAG}",
              "digest": "${IMAGE_DIGEST}"
            },
            "source": {
              "repository": "${GITHUB_REPOSITORY}",
              "commit": "${GITHUB_SHA}",
              "ref": "${GITHUB_REF}",
              "workflow": "${GITHUB_WORKFLOW}",
              "workflow_ref": "${GITHUB_WORKFLOW_REF}"
            },
            "build": {
              "provider": "github-actions",
              "runner": "${RUNNER_NAME}",
              "run_id": "${GITHUB_RUN_ID}",
              "run_number": "${GITHUB_RUN_NUMBER}",
              "run_attempt": "${GITHUB_RUN_ATTEMPT}",
              "run_url": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
              "started_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            },
            "provenance": {
              "image_attestation": "docker-buildx",
              "artifact_attestation": "github-artifact-attestation"
            }
          }
          EOF

          printf '%s@%s\n' "${IMAGE_NAME}" "${IMAGE_DIGEST}" > provenance/image-digest.txt

      - name: Upload release evidence
        uses: actions/upload-artifact@v6
        with:
          name: provenance-${{ steps.meta.outputs.pre_release }}
          path: provenance/

      - name: Attest release metadata
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: provenance/release-metadata.json

      - name: Attest image digest manifest
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: provenance/image-digest.txt
